<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Newsfeed</title>
    <link rel="alternate" type="application/rss+xml" title="Horizon Selected RSS" href="./feeds/horizon-selected-zh.xml">
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2933;
        background: #f7f8fa;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        letter-spacing: 0;
      }
      p {
        line-height: 1.7;
      }
      a {
        color: #0b5cad;
      }
      .feed-link {
        display: block;
        padding: 14px 0;
        font-size: 18px;
        overflow-wrap: anywhere;
      }
      .meta {
        color: #52616f;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Newsfeed</h1>
      <p>这是 Horizon 生成的精选 RSS 输出，只保存阅读结果，不保存 Horizon 代码。</p>
      <a class="feed-link" href="./feeds/horizon-selected-zh.xml">订阅 Horizon Selected RSS</a>
      <p class="meta">把上面的链接加到 Reeder、NetNewsWire、Inoreader 或其他 RSS 阅读器里。</p>
    </main>
  </body>
</html>
